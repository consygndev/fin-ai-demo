<!DOCTYPE html>
<html>
<head>
  <title>FIN AI Demo</title>
  <meta charset="UTF-8">

  <script>
    window.intercomSettings = {
      api_base: "https://api-iam.intercom.io",
    user_id: "12345",
    email: "user@example.com",
    name: "John Doe",
    plan_type: "basic",
      app_id: "tuq2rbe3"
    };
  </script>

  <script>
    (function(){
      var w=window;
      var ic=w.Intercom;
      if(typeof ic==="function"){
        ic('reattach_activator');
        ic('update',w.intercomSettings);
      } else {
        var d=document;
        var i=function(){i.c(arguments);};
        i.q=[];
        i.c=function(args){i.q.push(args);};
        w.Intercom=i;
        var l=function(){
          var s=d.createElement('script');
          s.type='text/javascript';
          s.async=true;
          s.src='https://widget.intercom.io/widget/tuq2rbe3';
          var x=d.getElementsByTagName('script')[0];
          x.parentNode.insertBefore(s,x);
        };
        if(document.readyState==='complete'){
          l();
        } else if(w.attachEvent){
          w.attachEvent('onload',l);
        } else {
          w.addEventListener('load',l,false);
        }
      }
    })();
  </script>

</head>

<body style="font-family: Arial; margin:40px">

<h1>AI Customer Support Demo</h1>

<p>Ask any question using the chat bubble.</p>

<h3>Example questions</h3>
<ul>
<li>What pricing plans do you offer?</li>
<li>How do I upgrade my plan?</li>
<li>What integrations are supported?</li>
<li>How do I cancel my subscription?</li>
</ul>

</body>
</html>
